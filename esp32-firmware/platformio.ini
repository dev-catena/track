[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<*> -<main_test.cpp>

; Partição OTA A/B: permite rollback automático se o novo firmware crashar antes de validar
board_build.partitions = default.csv

; Bibliotecas necessárias
lib_deps = 
    bblanchon/ArduinoJson@^6.21.3
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^1.4.0

; Firmware de teste: LED N acende quando sensor N está HIGH
[env:esp32dev_test]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = -<main.cpp> +<main_test.cpp>