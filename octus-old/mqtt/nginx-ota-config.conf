# Configuração nginx para OTA - Sistema MQTT IoT
# Arquivo: nginx-ota-config.conf

server {
    listen 8080;
    server_name firmware.iot.local;
    root /var/www/firmware;
    index index.html;

    # Logs específicos para OTA
    access_log /var/log/nginx/ota-access.log;
    error_log /var/log/nginx/ota-error.log;

    # Headers para CORS
    add_header Access-Control-Allow-Origin "*";
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
    add_header Access-Control-Allow-Headers "Content-Type, Authorization";

    # Página principal
    location / {
        try_files $uri $uri/ =404;
    }

    # API de status
    location /api/version {
        add_header Content-Type application/json;
        return 200 '{"server": "nginx", "version": "1.0.0", "ota": true, "timestamp": "$time_iso8601"}';
    }

    # API de status geral
    location /status {
        add_header Content-Type application/json;
        return 200 '{"status": "online", "server": "nginx", "ota_enabled": true}';
    }

    # Servir arquivos de firmware
    location /firmware/ {
        # Headers para download de firmware
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition "attachment";

        # Cache para firmwares
        expires 1h;
        add_header Cache-Control "public, immutable";

        # Log de downloads
        access_log /var/log/nginx/firmware-downloads.log;

        try_files $uri =404;
    }

    # Servir arquivos JSON
    location ~* \.json$ {
        add_header Content-Type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Servir arquivos MD5
    location ~* \.md5$ {
        add_header Content-Type text/plain;
        add_header Cache-Control "no-cache";
    }

    # Servir arquivos BIN
    location ~* \.bin$ {
        add_header Content-Type application/octet-stream;
        add_header Content-Disposition "attachment";
        add_header Cache-Control "public, max-age=3600";
    }

    # Bloquear acesso a arquivos sensíveis
    location ~ /\. {
        deny all;
    }

    # Limite de tamanho para uploads (se necessário)
    client_max_body_size 10M;
}
