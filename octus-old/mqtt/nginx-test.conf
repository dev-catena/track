server {
    listen 8080;
    server_name firmware.iot.local localhost;
    root /var/www/firmware;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /api/version {
        default_type application/json;
        return 200 '{"server": "nginx", "version": "1.0.0", "ota": true, "timestamp": "$time_iso8601"}';
    }

    location /status {
        default_type application/json;
        return 200 '{"status": "online", "server": "nginx", "ota": true}';
    }
}
