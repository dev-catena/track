<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Octopus Icon -->
  <g fill="#3E4A59">
    <!-- Head/Body -->
    <circle cx="200" cy="160" r="70"/>
    
    <!-- Eyes -->
    <circle cx="180" cy="150" r="8" fill="#ffffff"/>
    <circle cx="220" cy="150" r="8" fill="#ffffff"/>
    <circle cx="182" cy="152" r="4" fill="#3E4A59"/>
    <circle cx="222" cy="152" r="4" fill="#3E4A59"/>
    
    <!-- Tentacles -->
    <!-- Left outer tentacle -->
    <path d="M 150 200 Q 120 240 100 280 Q 85 310 95 340 C 100 355 110 360 120 350 Q 130 340 125 320 Q 120 300 130 270 Q 140 245 150 230 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Left middle tentacle -->
    <path d="M 170 210 Q 155 250 145 290 Q 140 320 148 350 C 152 365 162 368 170 358 Q 178 348 175 328 Q 172 308 180 278 Q 188 253 190 235 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Left inner tentacle -->
    <path d="M 185 220 Q 180 260 178 300 Q 177 330 183 360 C 186 375 195 378 202 368 Q 208 358 207 338 Q 206 318 210 288 Q 214 263 212 245 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Right inner tentacle -->
    <path d="M 215 220 Q 220 260 222 300 Q 223 330 217 360 C 214 375 205 378 198 368 Q 192 358 193 338 Q 194 318 190 288 Q 186 263 188 245 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Right middle tentacle -->
    <path d="M 230 210 Q 245 250 255 290 Q 260 320 252 350 C 248 365 238 368 230 358 Q 222 348 225 328 Q 228 308 220 278 Q 212 253 210 235 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Right outer tentacle -->
    <path d="M 250 200 Q 280 240 300 280 Q 315 310 305 340 C 300 355 290 360 280 350 Q 270 340 275 320 Q 280 300 270 270 Q 260 245 250 230 Z" stroke="#3E4A59" stroke-width="2"/>
    
    <!-- Tentacle suckers (small circles) -->
    <circle cx="110" cy="310" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="118" cy="330" r="4" fill="#2d3642" opacity="0.5"/>
    <circle cx="155" cy="320" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="165" cy="340" r="4" fill="#2d3642" opacity="0.5"/>
    <circle cx="190" cy="330" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="195" cy="350" r="4" fill="#2d3642" opacity="0.5"/>
    <circle cx="210" cy="330" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="205" cy="350" r="4" fill="#2d3642" opacity="0.5"/>
    <circle cx="245" cy="320" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="235" cy="340" r="4" fill="#2d3642" opacity="0.5"/>
    <circle cx="290" cy="310" r="5" fill="#2d3642" opacity="0.5"/>
    <circle cx="282" cy="330" r="4" fill="#2d3642" opacity="0.5"/>
  </g>
</svg>

